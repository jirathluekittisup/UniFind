<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UniFind Admin — Overview</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="shell" class="app"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function injectHTML(container, html) {
      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:420px;border:0;display:block';
      iframe.scrolling = 'no';
      iframe.srcdoc = `<!doctype html><html><head><meta charset="utf-8">
        <style>
          html,body{margin:0;padding:0;font-family:-apple-system,sans-serif;overflow:hidden}
          .plotly-graph-div{width:100% !important;height:400px !important}
        </style></head><body>${html}
        <script>
          window.addEventListener('load', () => {
            const h = document.body.scrollHeight;
            parent.postMessage({ type:'iframeHeight', h, id: window.name }, '*');
          });
        <\/script>
        </body></html>`;
      iframe.name = 'chart-' + Math.random().toString(36).slice(2);
      container.appendChild(iframe);
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'iframeHeight' && e.data.id === iframe.name) {
          iframe.style.height = (e.data.h + 4) + 'px';
        }
      });
    }

    (async () => {
      const user = await requireAdmin();
      if (!user) return;
      renderShell('dashboard', user);
      const main = document.getElementById('main');
      main.innerHTML = `
        <div class="page-head"><h2>Overview</h2><span id="ts" style="color:var(--muted);font-size:13px"></span></div>
        <div class="stats" id="stats"><div style="color:var(--muted)">Loading…</div></div>
        <div class="panel">
          <h3>Items over last 30 days</h3>
          <div id="chart-time">Loading chart…</div>
        </div>
        <div class="panel">
          <h3>Items by Category</h3>
          <div id="chart-cat">Loading chart…</div>
        </div>
        <div class="panel">
          <h3>Flagged Messages</h3>
          <div id="flagged"></div>
        </div>
      `;
      document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleString();

      try {
        const s = await api('/api/admin/stats');
        const cards = [
          { label: 'Total Users',    value: s.total_users,          cls: 'accent' },
          { label: 'Total Items',    value: s.total_items,          cls: 'accent' },
          { label: 'Lost',           value: s.total_lost,           cls: 'danger' },
          { label: 'Found',          value: s.total_found,          cls: 'warn' },
          { label: 'Resolved',       value: s.resolved,             cls: 'accent' },
          { label: 'Recovery Rate',  value: (s.recovery_rate ?? 0) + '%', cls: 'accent' },
          { label: 'Claim Success',  value: (s.claim_success_rate ?? 0) + '%', cls: 'accent' },
        ];
        document.getElementById('stats').innerHTML = cards.map(c =>
          `<div class="stat ${c.cls}"><div class="label">${c.label}</div><div class="value">${c.value ?? '–'}</div></div>`
        ).join('');

        const [timeChart, catChart] = await Promise.all([
          api('/api/admin/chart/items-over-time'),
          api('/api/admin/chart/items-by-category'),
        ]);
        injectHTML(document.getElementById('chart-time'), timeChart.html || 'No data yet.');
        injectHTML(document.getElementById('chart-cat'), catChart.html || 'No data yet.');

        const fm = await api('/api/admin/flagged-messages');
        const rows = (fm.messages || []).map(m => `
          <tr>
            <td>${new Date(m.created_at).toLocaleString()}</td>
            <td>${m.sender_name || m.sender_id}</td>
            <td style="color:var(--red)">${(m.body || '').replace(/</g,'&lt;')}</td>
          </tr>
        `).join('') || '<tr><td colspan="3" style="color:var(--muted)">None. 🎉</td></tr>';
        document.getElementById('flagged').innerHTML = `
          <table><thead><tr><th>When</th><th>Sender</th><th>Body</th></tr></thead><tbody>${rows}</tbody></table>
        `;
      } catch (e) {
        document.getElementById('stats').innerHTML =
          `<div style="color:var(--red)">Failed to load: ${e.message}</div>`;
      }
    })();
  </script>
</body>
</html>
