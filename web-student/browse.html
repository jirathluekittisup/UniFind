<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniFind — Browse</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>if (!requireAuth()) {} else renderNav('browse.html');</script>

  <div class="container">
    <div class="page-head">
      <h2>Browse Items</h2>
      <a href="report.html"><button class="primary accent" style="width:auto;padding:10px 18px">+ Report Item</button></a>
    </div>

    <div class="filters">
      <input id="q" placeholder="Search (e.g. black wallet)" />
      <select id="type">
        <option value="">All types</option>
        <option value="lost">Lost</option>
        <option value="found">Found</option>
      </select>
      <select id="category">
        <option value="">All categories</option>
        <option>Electronics</option><option>Accessories</option>
        <option>Clothing</option><option>Documents</option>
        <option>Keys</option><option>Bags</option>
        <option>Books</option><option>Other</option>
      </select>
      <button onclick="load()">Search</button>
    </div>

    <div id="results" class="grid"></div>
    <div id="empty" class="empty hidden">No items match your search.</div>
  </div>

  <script>
    async function load() {
      const q = document.getElementById('q').value.trim();
      const type = document.getElementById('type').value;
      const category = document.getElementById('category').value;
      const params = new URLSearchParams();
      if (q) params.set('q', q);
      if (type) params.set('type', type);
      if (category) params.set('category', category);
      try {
        const data = await api('/api/items?' + params.toString());
        const items = data.items || [];
        const root = document.getElementById('results');
        document.getElementById('empty').classList.toggle('hidden', items.length > 0);
        root.innerHTML = items.map(renderCard).join('');
      } catch (e) {
        document.getElementById('results').innerHTML = `<p class="error">${esc(e.message)}</p>`;
      }
    }

    function renderCard(it) {
      const photo = resolvePhotoUrl((it.photos && it.photos[0]) || it.photo_url);
      const thumb = photo
        ? `<img src="${esc(photo)}" alt="" />`
        : `<div class="thumb">📦</div>`;
      return `
        <div class="card" onclick="location.href='item.html?id=${it.id}'">
          <div class="thumb">${thumb}</div>
          <div class="body">
            <div class="row">
              <span class="badge ${it.type}">${it.type.toUpperCase()}</span>
              <span class="date">${fmtDate(it.created_at)}</span>
            </div>
            <h3>${esc(it.title)}</h3>
            <div class="meta">${esc(it.category)} · ${esc(it.location || '')}</div>
          </div>
        </div>`;
    }

    load();
    document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
  </script>
</body>
</html>
