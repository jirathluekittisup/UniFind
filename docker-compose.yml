services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: unifind
      MYSQL_USER: unifind
      MYSQL_PASSWORD: unifindpw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uunifind", "-punifindpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./backend
    env_file: ./backend/.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: unifind
      MYSQL_PASSWORD: unifindpw
      MYSQL_DB: unifind
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: unifind_logs
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started

  web-admin:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./web-admin:/usr/share/nginx/html:ro

  web-student:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./web-student:/usr/share/nginx/html:ro

volumes:
  mysql_data:
  mongo_data:
